    }
  </style>
  <rect class="frame" x="5" y="5" width="38" height="38" rx="9" fill="none" stroke-width="2.6" />
  <!-- グライダー: ライフで最小の動く図形 -->
  <rect class="dead" x="10.8" y="10.8" width="7.4" height="7.4" rx="2.1" />
  <rect class="live" x="19.8" y="10.8" width="7.4" height="7.4" rx="2.1" />
  <rect class="dead" x="28.8" y="10.8" width="7.4" height="7.4" rx="2.1" />
  <rect class="dead" x="10.8" y="19.8" width="7.4" height="7.4" rx="2.1" />
  <rect class="dead" x="19.8" y="19.8" width="7.4" height="7.4" rx="2.1" />
  <rect class="live" x="28.8" y="19.8" width="7.4" height="7.4" rx="2.1" />
  <rect class="live" x="10.8" y="28.8" width="7.4" height="7.4" rx="2.1" />
  <rect class="live" x="19.8" y="28.8" width="7.4" height="7.4" rx="2.1" />
